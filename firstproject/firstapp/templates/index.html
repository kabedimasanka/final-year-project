<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battery Swap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            font-family: 'Poppins', Arial, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(184, 240, 90, 0.22), transparent 34%),
                linear-gradient(135deg, #f8fff4 0%, #eef8f1 52%, #f7fbff 100%);
            color: #102018;
        }

        .card {
            width: 100%;
            max-width: 460px;
            background: white;
            border: 1px solid #d8eadf;
            border-radius: 8px;
            box-shadow: 0 22px 50px rgba(7, 74, 39, 0.12);
            padding: 32px;
        }

        h2 {
            color: #063f2a;
            margin: 0 0 20px;
            text-align: center;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #c9ded0;
            border-radius: 8px;
            font: inherit;
        }

        button {
            min-height: 44px;
            margin-top: 8px;
            background: #078a3f;
            color: white;
            border: 0;
            border-radius: 8px;
            font: inherit;
            font-weight: 800;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>Battery Swap</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Save</button>
        </form>
    </div>
</body>
</html>
