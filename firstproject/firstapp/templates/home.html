{% extends 'base.html' %}

{% block content %}
<section class="cover">
    <div class="cover-content">
        <span>Smart battery swapping</span>
        <h1>Energy ready when your ride is.</h1>
        <p>Reserve, receive a secure code, and swap batteries without waiting for a charge.</p>
        <a href="{% url 'signup' %}" class="btn-primary">Get Started</a>
    </div>
</section>

<style>
    .cover {
        min-height: calc(100vh - 76px);
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 40px 24px;
    }

    .cover-content {
        max-width: 760px;
    }

    .cover-content span {
        color: #078a3f;
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
    }

    .cover-content h1 {
        color: #063f2a;
        font-size: clamp(36px, 7vw, 70px);
        line-height: 1.04;
        margin: 12px 0 16px;
    }

    .cover-content p {
        color: #5a6b62;
        font-size: 17px;
        line-height: 1.7;
        margin: 0 auto 24px;
        max-width: 620px;
    }
</style>
{% endblock %}
