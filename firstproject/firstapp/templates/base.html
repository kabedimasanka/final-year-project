<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Battery Swap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --ink: #102018;
            --muted: #5a6b62;
            --deep: #063f2a;
            --green: #078a3f;
            --lime: #b8f05a;
            --amber: #ffc857;
            --surface: #ffffff;
            --page: #f4faf3;
            --line: #d8eadf;
            --shadow: 0 18px 40px rgba(7, 74, 39, 0.10);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Poppins', Arial, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(184, 240, 90, 0.22), transparent 34%),
                linear-gradient(135deg, #f8fff4 0%, #eef8f1 48%, #f7fbff 100%);
            color: var(--ink);
            min-height: 100vh;
        }

        a {
            color: inherit;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            padding: 18px 34px;
            background: rgba(6, 63, 42, 0.96);
            color: white;
            border-bottom: 3px solid var(--lime);
        }

        .logo {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 0;
        }

        .logo span {
            color: var(--lime);
        }

        .nav {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav a {
            color: #f7fff8;
            text-decoration: none;
            padding: 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            transition: 0.2s ease;
        }

        .nav a:hover {
            background: var(--lime);
            border-color: var(--lime);
            color: var(--deep);
        }

        .container {
            padding: 0;
        }

        .message {
            max-width: 1040px;
            margin: 18px auto 0;
            padding: 12px 16px;
            border-radius: 8px;
            background: #e7f8ea;
            border: 1px solid #bfe5c8;
            color: #075f2f;
            font-weight: 600;
        }

        .btn-primary {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            min-height: 44px;
            padding: 11px 20px;
            background: var(--green);
            color: white;
            border: 0;
            border-radius: 8px;
            font-family: inherit;
            font-weight: 800;
            text-decoration: none;
            cursor: pointer;
            box-shadow: 0 10px 24px rgba(7, 138, 63, 0.22);
        }

        .btn-primary:hover {
            background: #056d33;
        }

        @media (max-width: 760px) {
            .topbar {
                align-items: flex-start;
                flex-direction: column;
                padding: 16px 20px;
            }
        }
    </style>
</head>

<body>
    <div class="topbar">
        <div class="logo"><span>Volt</span>Swap Energy</div>

        <div class="nav">
            <a href="{% url 'home' %}">Home</a>
            <a href="{% url 'signup' %}">Sign Up</a>
            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'reservation' %}">Reservation</a>
        </div>
    </div>

    {% if messages %}
        {% for message in messages %}
            <div class="message">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
