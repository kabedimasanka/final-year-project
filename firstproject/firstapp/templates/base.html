<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Swapping Battery System</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: #222;
            color: white;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
        }

        .nav a {
            color: white;
            margin-left: 15px;
            text-decoration: none;
            padding: 6px 12px;
            border: 1px solid white;
            border-radius: 5px;
            transition: 0.3s;
        }

        .nav a:hover {
            background: white;
            color: black;
        }

        .container {
            padding: 20px;
        }

        .message {
            padding: 10px;
            margin: 15px 20px;
            border-radius: 5px;
            background-color: #d4edda;
            color: #155724;
        }
    </style>
</head>

<body>

    <!-- TOP BAR -->
    <div class="topbar">
        <div class="logo">SWAPPING BATTERY SYSTEM</div>

        <div class="nav">
            <a href="{% url 'home' %}">Home</a>
            <a href="{% url 'signup' %}">Sign Up</a>
            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'reservation' %}">Reservation</a>
        </div>
    </div>

    <!-- MESSAGES (ONLY ONCE) -->
    {% if messages %}
        {% for message in messages %}
            <div class="message">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <!-- PAGE CONTENT -->
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
