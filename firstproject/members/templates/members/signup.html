{% extends 'base.html' %}

{% block content %}
<main class="auth-page">
    <section class="auth-info">
        <span>Join the network</span>
        <h1>Create your energy mobility account.</h1>
        <p>Reserve battery swaps, receive secure station codes, and keep your rides moving.</p>
    </section>

    <section class="auth-card">
        <h2>Create Account</h2>

        <form method="POST">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password1" placeholder="Password" required>
            <input type="password" name="password2" placeholder="Confirm Password" required>
            <button type="submit">Get Started</button>
        </form>

        <p class="text">
            Already have an account? <a href="{% url 'login' %}">Login</a>
        </p>
    </section>
</main>

<style>
    .auth-page {
        min-height: calc(100vh - 76px);
        display: grid;
        grid-template-columns: 1fr 420px;
        gap: 28px;
        max-width: 1120px;
        margin: 0 auto;
        padding: 54px 24px;
        align-items: center;
    }

    .auth-info {
        background: #063f2a;
        color: white;
        border-radius: 8px;
        padding: 44px;
        min-height: 430px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        border-bottom: 5px solid #b8f05a;
    }

    .auth-info span {
        color: #b8f05a;
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
    }

    .auth-info h1 {
        margin: 12px 0 16px;
        font-size: clamp(30px, 4vw, 48px);
        line-height: 1.08;
    }

    .auth-info p {
        color: #d7eadc;
        line-height: 1.7;
        margin: 0;
    }

    .auth-card {
        background: #ffffff;
        border: 1px solid #d8eadf;
        border-radius: 8px;
        box-shadow: 0 22px 50px rgba(7, 74, 39, 0.12);
        padding: 32px;
    }

    .auth-card h2 {
        color: #063f2a;
        margin: 0 0 22px;
        text-align: center;
    }

    form {
        display: flex;
        flex-direction: column;
        gap: 14px;
    }

    input {
        width: 100%;
        padding: 12px 13px;
        border: 1px solid #c9ded0;
        border-radius: 8px;
        outline: none;
        font: inherit;
    }

    input:focus {
        border-color: #078a3f;
        box-shadow: 0 0 0 3px rgba(7, 138, 63, 0.12);
    }

    button {
        min-height: 44px;
        padding: 12px;
        background: #078a3f;
        color: white;
        border: 0;
        border-radius: 8px;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
    }

    button:hover {
        background: #056d33;
    }

    .text {
        color: #5a6b62;
        margin: 18px 0 0;
        text-align: center;
        font-size: 14px;
    }

    .text a {
        color: #078a3f;
        font-weight: 800;
        text-decoration: none;
    }

    @media (max-width: 860px) {
        .auth-page {
            grid-template-columns: 1fr;
        }
    }
</style>
{% endblock %}
