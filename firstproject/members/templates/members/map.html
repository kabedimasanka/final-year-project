<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battery Station Map</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Poppins', Arial, sans-serif;
            background:
                radial-gradient(circle at top right, rgba(184, 240, 90, 0.22), transparent 32%),
                linear-gradient(135deg, #f8fff4 0%, #eef8f1 52%, #f7fbff 100%);
            color: #102018;
        }

        .map-page {
            max-width: 1120px;
            margin: 0 auto;
            padding: 38px 24px;
        }

        h1 {
            color: #063f2a;
            margin: 0 0 8px;
        }

        p {
            color: #5a6b62;
            margin: 0 0 22px;
        }

        #map {
            height: 620px;
            border: 1px solid #d8eadf;
            border-radius: 8px;
            box-shadow: 0 22px 50px rgba(7, 74, 39, 0.12);
            overflow: hidden;
        }
    </style>
</head>
<body>
<main class="map-page">
    <h1>Nearby Battery Stations</h1>
    <p>Find a predefined swap point for your reserved battery.</p>
    <div id="map"></div>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const stations = [
        {
            name: 'ISBAT University',
            description: 'Main Campus, Kampala',
            lat: 0.334444,
            lng: 32.601389
        },
        {
            name: 'Acacia Mall',
            description: 'Battery swap point near Acacia Mall',
            lat: 0.3382764720220686,
            lng: 32.586334446270236
        },
        {
            name: 'Mapera House',
            description: 'Battery swap point near Mapera House',
            lat: 0.3145754724601944,
            lng: 32.57838093779839
        }
    ];

    const map = L.map('map').setView([0.329, 32.589], 13);

    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    const bounds = [];

    stations.forEach((station, index) => {
        const position = [station.lat, station.lng];
        bounds.push(position);

        L.marker(position).addTo(map).bindPopup(`
            <strong>${station.name}</strong><br>
            ${station.description}<br>
            <small>${station.lat}, ${station.lng}</small>
        `);

        if (index === 0) {
            L.popup()
                .setLatLng(position)
                .setContent(`<strong>${station.name}</strong><br>${station.description}`)
                .openOn(map);
        }
    });

    map.fitBounds(bounds, { padding: [35, 35] });
</script>
</body>
</html>
